<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Erasmus+ Projects - UBDB</title>
  <link rel="icon" type="image/x-icon" href="../assets/ubdb-icon.ico">
  <link rel="stylesheet" href="../style.css">
</head>
<body>
<header>
  <nav>
    <a href="../index.html" class="logo">
      <img src="../assets/ubdb-logo.png" alt="UBDB Logo" />
    </a>
    <button class="menu-toggle" onclick="toggleMenu()">☰</button>
    <ul class="nav-links" id="navLinks">
      <li><a href="../index.html">Home</a></li>
      <li class="dropdown">
        <a href="#" onclick="return false;" aria-haspopup="true" aria-expanded="false">Activity ▾</a>
        <div class="dropdown-content" role="menu" aria-label="Activity menu">
          <div class="dropdown-column">
            <span class="submenu-toggle" aria-haspopup="true" aria-expanded="false">Erasmus+ ▸</span>
            <div class="submenu" role="menu">
              <a href="nature-needs-us.html">Nature Needs Us</a>
            </div>
          </div>

          <div class="dropdown-column">
            <span class="submenu-toggle" aria-haspopup="true" aria-expanded="false">Community ▸</span>
            <div class="submenu" role="menu">
              <a href="donation-campaign.html">Donation campaign</a>
            </div>
          </div>
        </div>
      </li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>
</header>

<div class="container">
  <section class="page-title">
    <h1>Erasmus+ Projects</h1>
  </section>

  <section class="project-grid">
    <div class="project-card">
      <a href="nature-needs-us.html">
        <h3>Nature Needs Us</h3>
        <p>An initiative to promote environmental awareness and action.</p>
      </a>
    </div>
    <!-- More projects can be added here -->
  </section>
</div>

<footer>
  <p><strong>UBDB</strong></p>
  <p>United By Different Behaviours.</p>
  <p>2026 | UBDB | All Rights Reserved</p>
</footer>

<script>
  function toggleMenu() {
    const navLinks = document.getElementById('navLinks');
    navLinks.classList.toggle('active');

    // on small screens, when the nav opens, also open nested submenus
    if (window.innerWidth <= 768) {
      const submenus = document.querySelectorAll('.dropdown .submenu');
      const toggles = document.querySelectorAll('.submenu-toggle');
      const activityToggle = document.querySelector('.dropdown > a');
      if (navLinks.classList.contains('active')) {
        submenus.forEach(s => s.classList.add('open'));
        toggles.forEach(t => t.setAttribute('aria-expanded', 'true'));
        if (activityToggle) activityToggle.setAttribute('aria-expanded', 'true');
      } else {
        submenus.forEach(s => s.classList.remove('open'));
        toggles.forEach(t => t.setAttribute('aria-expanded', 'false'));
        if (activityToggle) activityToggle.setAttribute('aria-expanded', 'false');
      }
    }
  }

  // submenu toggles for touch / small screens
  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('.submenu-toggle').forEach(function (btn) {
      btn.addEventListener('click', function (e) {
        // only allow manual toggling for larger screens or if JS wants it
        if (window.innerWidth > 768) return;
        e.preventDefault();
        const submenu = btn.nextElementSibling;
        const expanded = btn.getAttribute('aria-expanded') === 'true';
        btn.setAttribute('aria-expanded', String(!expanded));
        if (submenu) submenu.classList.toggle('open');
      });
    });
  });
</script>
</body>
</html>
